name: dbt_NBA

profile: dbt_NBA

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  dbt_NBA:
    +schema: raw

models:
  dbt_NBA:
    # Materialize staging models as views, and marts as tables
    bronze:
      +materialized: view
    silver:
      +materialized: view
    gold:
      +materialized: table
